<svg width="1920" height="900" viewBox="0 0 1920 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="washRight" x1="1140" y1="80" x2="1880" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9DDCFF" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#7CCBFF" stop-opacity="0.1"/>
