    <linearGradient id="ribbonA" x1="120" y1="780" x2="1790" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B7E7FF" stop-opacity="0.24"/>
      <stop offset="0.45" stop-color="#7CCBFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#9DDCFF" stop-opacity="0.12"/>
